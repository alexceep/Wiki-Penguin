<!DOCTYPE html>
<html lang="pt">

<head>
	<meta charset="UTF-8">
	<meta http-equiv="X-UA-Compatible" content="IE=edge">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>Registro - Wiki Penguin</title>
	<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet"
		integrity="sha384-T3c6CoIi6uLrA9TneNEoa7RxnatzjcDSCmG1MXxSR1GAsXEV/Dwwykc2MPK8M2HN" crossorigin="anonymous">
</head>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"
	integrity="sha384-C6RzsynM9kWDrMNeT87bh95OGNyZPhcTNXj1NW7RuBCsyN/o0jlpcV8Qyq46cDfL"
	crossorigin="anonymous"></script>
<link href="css/FormCss.css" rel="stylesheet">
<link rel="shortcut icon" href="img/icon1.png">

<body>
	<div class="container-fluid">
		<div class="row">
			<div class="min-vh-100 d-flex justify-content-center align-items-center">
				<form method="post" action="error.html" id="form">
					<a href="index.html">Voltar</a>
					<h2 class="text-center mb-4 mt-2">Cadastro</h2>
					<div class="form-group mb-3">
						<label for="username" class="form-label">Apelido:</label>
						<input type="text" class="form-control" id="username" name="username"
							placeholder="Digite seu apelido" required>
					</div>
					<div class="form-group mb-3">
						<label for="email" class="form-label">Email:</label>
						<input type="email" class="form-control" id="email" name="email" placeholder="club@penguin.com"
							required>
					</div>
					<div class="form-group mb-3">
						<label for="password" class="form-label">Senha:</label>
						<input type="password" class="form-control" id="password" name="password"
							placeholder="Digite sua senha" required>
						<div class="form-text text-muted text-center">Já possui uma conta? <a href="login.html">Entrar
						</div>
					</div>
					<div class="d-flex justify-content-center align-items-center mt-4"><button type="submit"
							class="btn btn-info">Cadastrar</button></div>
				</form>
			</div>
		</div>
	</div>
</body>

</html>
